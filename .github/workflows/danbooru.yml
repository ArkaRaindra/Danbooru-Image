name: Update Danbooru Gallery

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

permissions:
  contents: write


jobs:
  update-gallery:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Install Python dependency
        run: |
          pip install requests


      - name: Generate Gallery
        run: |
          python scripts/danbooru.py


      - name: Commit update

        run: |

          git config --global user.name "github-actions"

          git config --global user.email "actions@github.com"


          git add README.md


          git commit -m "Update Danbooru Gallery" || exit 0


          git push
